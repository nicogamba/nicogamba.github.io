<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
    <title>Nicolás Gamba Portafolio</title>
</head>

<body>

    <!-- Barra de Navegación -->
    <nav id="navbar" class="navbar">
        <ul class="navbar-ul">
            <li><a href="#welcome-section">Bienvenida</a></li>
            <li><a href="#projects">Proyectos</a></li>
            <li><a href="#profile-link" target="_blank">Perfil</a></li>
        </ul>
    </nav>

    <!-- Sección de Bienvenida -->
    <section id="welcome-section" class="welcome-section">
        <h1 id="welcome-hello">Hello! I'm Nico</h1>
        <div id="text-container">
            <h1 id="welcome-text"></h1>
            <h1 id="welcome-underscore">_</h1>
        </div>
    </section>

    <!-- Sección de Proyectos -->
    <section id="projects" class="projects-section">
        <div class="project-tile">
            <h2>Proyecto 1</h2>
            <p>Descripción del proyecto 1.</p>
            <a href="#" target="_blank">Ver Proyecto</a>
        </div>
    </section>

    <footer class="footer">
        <!-- Enlace al Perfil -->
        <a id="profile-link" class="profile-link" href="https://github.com/nicogamba" target="_blank">
            Mi GitHub</a>
        <a id="gitlab-link" class="profile-link" href="https://gitlab.com/nicolasgamba" target="_blank">
            Mi GitLab</a>
    </footer>

    <script>
        // script para aparición y parpadeo de texto
        document.addEventListener("DOMContentLoaded", function () {
            const welcomeText = document.getElementById("welcome-text");
            const welcomeUnderscore = document.getElementById("welcome-underscore");

            const texts = [
                "¡",
                "¡And I'm a developer!",
                "¡And I'm a ",
                "¡And I'm a guitarist!",
                "¡",
                "¡Y soy desarrollador!",
                "¡Y soy ",
                "¡Y soy programador!",
                "¡Y soy ",
                "¡Y soy guitarrista!",
            ];
            const blinkInterval = 500; // Intervalo de parpadeo en milisegundos
            const resetInterval = 1500; // Intervalo de reinicio de texto

            let index = 0;
            let textIndex = 0;
            let isTextIndexGoingUp = true;

            function displayText() {
                if (index < texts[textIndex].length) {
                    welcomeText.textContent += texts[textIndex][index];
                    index++;
                    setTimeout(displayText, 100); // Ajusta la velocidad de aparición de los caracteres
                } else if (index > texts[textIndex].length) {
                    welcomeText.textContent = welcomeText.textContent.substring(0, welcomeText.textContent.length - 1);
                    index--;
                    setTimeout(displayText, 100);
                } else {
                    setTimeout(changeText, resetInterval);
                }
            }

            function changeText() {
                isTextIndexGoingUp ? textIndex++ : textIndex--;
                if (textIndex == 0) {
                    isTextIndexGoingUp = true;
                } else if (textIndex == texts.length - 1) {
                    isTextIndexGoingUp = false;
                }
                displayText();
            }

            setInterval(() => {
                welcomeUnderscore.classList.toggle("blink");
            }, blinkInterval);
            displayText();
        });
    </script>

</body>

</html>
